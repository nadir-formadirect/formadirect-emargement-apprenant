<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FORMADIRECT - Feuille d'Émargement Apprenant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #333;
      background: #f5f5f5;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    
    .header {
      text-align: center;
      margin-bottom: 2rem;
      background: white;
      padding: 2rem;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
    }
    
    .header-logo {
      display: inline-block;
      font-weight: 600;
      font-size: 14px;
      color: #1a3a52;
      margin-bottom: 0.5rem;
      background: #f0f4f8;
      padding: 0.5rem 1rem;
      border-radius: 4px;
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: 600;
      margin: 0.5rem 0;
      color: #1a3a52;
    }
    
    .header p {
      font-size: 14px;
      color: #666;
      margin: 0;
    }
    
    .badge {
      display: inline-block;
      background: #f0743d;
      color: white;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 0.5rem;
    }
    
    .info-box {
      background: #f0f4f8;
      border-left: 4px solid #f0743d;
      padding: 1rem;
      border-radius: 4px;
      font-size: 13px;
      color: #555;
      margin-bottom: 1.5rem;
    }
    
    .form-section {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    
    .form-section h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #1a3a52;
      border-bottom: 2px solid #f0743d;
      padding-bottom: 0.75rem;
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    
    .form-grid.full {
      grid-template-columns: 1fr;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
    }
    
    .form-group label {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #555;
    }
    
    .form-group input,
    .form-group select {
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }
    
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #f0743d;
      background: #fff9f6;
      box-shadow: 0 0 0 2px rgba(240, 116, 61, 0.1);
    }
    
    .form-group input:disabled {
      background: #f5f5f5;
      color: #666;
      cursor: not-allowed;
    }
    
    .signature-container {
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    
    .signature-label {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #555;
      display: block;
    }
    
    .canvas-wrapper {
      position: relative;
      display: block;
      width: 100%;
      margin-bottom: 0.75rem;
    }
    
    canvas {
      display: block;
      width: 100%;
      height: auto;
      border: 2px dashed #ddd;
      border-radius: 4px;
      cursor: crosshair;
      background: white;
      touch-action: none;
      max-width: 100%;
    }
    
    .btn-group {
      display: flex;
      gap: 0.75rem;
    }
    
    button {
      padding: 0.5rem 1rem;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      color: #333;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
      font-family: inherit;
    }
    
    button:hover {
      background: #f5f5f5;
      border-color: #999;
    }
